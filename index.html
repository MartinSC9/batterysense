<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/battery-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BatterySense - Plataforma de monitoreo inteligente de bancos de baterías" />

    <!-- Open Graph -->
    <meta property="og:title" content="BatterySense" />
    <meta property="og:description" content="Monitoreo inteligente de bancos de baterías — Powered by TRISO" />
    <meta property="og:image" content="https://batterysense.vercel.app/og-image.png" />
    <meta property="og:url" content="https://batterysense.vercel.app" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BatterySense" />
    <meta name="twitter:description" content="Monitoreo inteligente de bancos de baterías — Powered by TRISO" />
    <meta name="twitter:image" content="https://batterysense.vercel.app/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>BatterySense - Monitoreo de Baterías</title>
  </head>
  <body style="margin:0">
    <div id="root">
      <div id="app-loader" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="40" height="40">
          <rect x="1" y="6" width="18" height="12" rx="2" ry="2"/>
          <line x1="23" y1="10" x2="23" y2="14"/>
          <line x1="11" y1="10" x2="11" y2="14"/>
          <line x1="7" y1="10" x2="7" y2="14"/>
          <polyline points="13 10 15 12 13 14"/>
        </svg>
        <span style="font-family:system-ui,sans-serif;font-size:14px;font-weight:600;color:#e2e8f0;letter-spacing:-0.3px">BatterySense</span>
        <div style="width:120px;height:2px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden">
          <div style="width:40%;height:100%;background:#3b82f6;border-radius:2px;animation:loader 1s ease-in-out infinite"></div>
        </div>
      </div>
    </div>
    <style>@keyframes loader{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}#app-loader.seen{display:none!important}</style>
    <script>
      var dk=localStorage.getItem('bs_darkMode')!=='false';
      document.body.style.background=dk?'#030712':'#f9fafb';
      if(sessionStorage.getItem('bs_loaded')){document.getElementById('app-loader').classList.add('seen')}else{sessionStorage.setItem('bs_loaded','1')}
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
